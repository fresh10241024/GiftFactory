<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curate a Gift - Chat</title>
    <link rel="stylesheet" href="./styles/base.css">
    <link rel="stylesheet" href="./styles/chat.css">
</head>
<body class="chat-page">
    <!-- Session switcher panel -->
    <div id="session-panel" style="display:none;position:fixed;top:0;left:0;width:300px;height:100vh;background:#111;border-right:1px solid rgba(255,255,255,0.08);z-index:100;padding:24px;box-sizing:border-box;overflow-y:auto">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
            <span style="font-size:0.9rem;opacity:0.5">My Gifts</span>
            <button id="close-panel" style="background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;opacity:0.5">✕</button>
        </div>
        <div id="panel-session-list" style="display:flex;flex-direction:column;gap:8px"></div>
        <button id="panel-new-btn" style="margin-top:16px;width:100%;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:#fff;border-radius:8px;cursor:pointer;font-size:0.85rem">+ Create New Gift</button>
    </div>

    <header class="chat-header">
        <div class="header-left">
            <span id="curate-btn" style="cursor:pointer">Curate a gift</span>
        </div>
        <div class="header-right">
            <button class="screenshot-btn" id="screenshot-btn" aria-label="Save this moment">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
            </button>
            <div class="artwork-info">
                <span class="artwork-title">AI Generative Canvas</span>
                <span class="artwork-date">Engine Active</span>
                <span class="artwork-medium">Digital Art Edition</span>
            </div>
            <img src="/1.webp" alt="Artwork" class="artwork-thumb">
        </div>
    </header>

    <!-- Screenshot panel (positioned via JS) -->
    <div class="screenshot-panel" id="screenshot-panel" style="display:none;">
        <p class="screenshot-panel__title" data-ss-i18n="ss-title">Save this moment</p>
        <p class="screenshot-panel__subtitle" data-ss-i18n="ss-subtitle">Keep it as a memory, share with a friend, or post it.</p>
        <div class="screenshot-panel__sizes">
            <button class="size-option is-active" data-size="original">
                <span class="size-ratio" data-ss-i18n="ss-original">Original</span>
                <span class="size-label" data-ss-i18n="ss-original-sub">Current size</span>
            </button>
            <button class="size-option" data-size="3:4">
                <span class="size-ratio">3 : 4</span>
                <span class="size-label" data-ss-i18n="ss-34-sub">Portrait card</span>
            </button>
        </div>
        <button class="screenshot-panel__save" id="save-image-btn" data-ss-i18n="ss-save">Save Image</button>
    </div>

    <main class="chat-container">
        <div class="chat-interaction">
            <div class="question-container">
                <h1 id="current-question">Who do you want to customize this gift for?</h1>
            </div>
            <div class="answer-container">
                <div class="actions-wrapper">
                    <div class="answer-button-wrapper">
                        <div id="answer-button" class="answer-button" tabindex="0">
                            <span class="button-text">Answer</span>
                            <div class="input-wrapper">
                                <span class="input-measure"></span>
                                <textarea id="answer-input" class="answer-input" autocomplete="off" spellcheck="false" rows="1" style="display: none;"></textarea>
                                <button class="send-btn" id="send-btn" type="button" aria-label="Send answer">Send ↵</button>
                            </div>
                        </div>
                    </div>
                    <div class="upload-wrapper">
                        <button class="upload-button" id="upload-button" aria-label="Upload image">
                            <div class="upload-icon-bg">
                                <span class="upload-icon-plus">+</span>
                            </div>
                        </button>
                        <input type="file" id="image-upload-input" accept="image/*" style="display: none;" multiple>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="uploaded-gallery" id="uploaded-gallery">
        <!-- Uploaded images will appear here -->
    </div>

    <div class="finish-chat-wrapper">
        <button id="finish-chat-button" class="finish-chat-button">
            Generate Analysis <span>→</span>
        </button>
    </div>

    <script type="module" src="./scripts/chat.js"></script>
</body>
</html>
