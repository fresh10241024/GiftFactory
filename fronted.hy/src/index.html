<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Website Gift | Codrops</title>
  <meta name="description" content="No more templates. Freeze unique memories in an interactive page built just for them." />
  <meta name="author" content="Theo Plawinski" />
  <link rel="shortcut icon" href="https://tympanus.net/favicon/favicon.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/index.css" />
  <script>
    document.documentElement.className = 'js';
  </script>
</head>

<body class="loading">
  <header class="frame">
    <div class="frame__infos">
      <h1>GiftFactory: AI-Curated Interactive Web Gifts</h1>
    </div>
    <div class="frame__auth-buttons">
      <a href="./dashboard.html" id="my-gifts-link" style="display:none;color:inherit;text-decoration:none;opacity:0.7;font-size:0.9rem;margin-right:20px">My Gifts</a>
      <button class="button--login" id="open-auth-modal">
        <span class="roll-text"><span class="roll-text-inner" data-text="Log in / Sign up">Log in / Sign up</span></span>
      </button>
    </div>
  </header>
  <main>
    <section class="block block--intro">
      <figure class="media">
        <img class="media__image" src="../8.webp" alt="Image 8" />
        <figcaption class="media__caption">Personal Website Gift Made for Someone Special
A custom website gift for someone special.</figcaption>
      </figure>
    </section>
    <section class="block block--main">
      <div class="block__wrapper">
        <div class="content">
          <h2 class="content__title">Custom Website Gift</h2>
          <p class="content__description">
            No more templates. Freeze unique memories in an interactive page built just for them.
          </p>
          <a class="content__button button--primary" href="./chat.html" onclick="localStorage.removeItem('chat_session_id')">Try for free</a>
        </div>
        <div class="gallery">
          <ul class="gallery__grid">
            <li class="gallery__item">
              <img class="gallery__image" src="../1.webp" alt="Image 1" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../2.webp" alt="Image 2" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../3.webp" alt="Image 3" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../4.webp" alt="Image 4" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../5.webp" alt="Image 5" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../6.webp" alt="Image 6" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../7.webp" alt="Image 7" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../8.webp" alt="Image 8" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../9.webp" alt="Image 9" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../10.webp" alt="Image 10" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../11.webp" alt="Image 11" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../12.webp" alt="Image 12" />
            </li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="modal-content">
      <button class="close-button" aria-label="Close">&times;</button>

      <!-- Login / Register -->
      <div id="auth-step-main">
        <div style="display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1)">
          <button id="tab-login" onclick="switchTab('login')" style="flex:1;background:none;border:none;color:#fff;padding:10px;font-size:0.9rem;cursor:pointer;border-bottom:2px solid #fff;opacity:1">Log in</button>
          <button id="tab-register" onclick="switchTab('register')" style="flex:1;background:none;border:none;color:#fff;padding:10px;font-size:0.9rem;cursor:pointer;border-bottom:2px solid transparent;opacity:0.4">Sign up</button>
        </div>

        <form id="auth-login-form">
          <input type="email" id="login-email" placeholder="Email" required autocomplete="email">
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
          <button type="submit">Log in</button>
          <p class="form-error"></p>
        </form>

        <form id="auth-register-form" style="display:none">
          <input type="email" id="reg-email" placeholder="Email" required autocomplete="email">
          <input type="password" id="reg-password" placeholder="Password (min 6 chars)" minlength="6" required autocomplete="new-password">
          <button type="submit">Create account</button>
          <p class="form-error"></p>
        </form>
      </div>

      <!-- placeholder to keep old JS refs working -->
      <div id="auth-step-code" style="display:none"></div>
      <div id="auth-step-setpw" style="display:none">
        <form id="auth-setpw-form" style="display:none">
          <button type="submit" style="display:none"></button>
          <p class="form-error"></p>
        </form>
        <button id="auth-skip-btn" style="background:none;border:none;opacity:0.5;cursor:pointer;margin-top:12px;font-size:0.85rem;color:inherit">Skip, maybe later</button>
      </div>
    </div>
  </div>

  <div class="homepage-credit">By RuiXi & HueYin</div>

  <script type="module" src="./scripts/index.js"></script>
</body>

</html>
