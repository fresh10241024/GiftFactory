<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Website Gift | Codrops</title>
  <meta name="description" content="No more templates. Freeze unique memories in an interactive page built just for them." />
  <meta name="author" content="Theo Plawinski" />
  <link rel="shortcut icon" href="https://tympanus.net/favicon/favicon.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/index.css" />
  <script>
    document.documentElement.className = 'js';
  </script>
</head>

<body class="loading">
  <header class="frame">
    <div class="frame__infos">
    </div>
    <div class="frame__auth-buttons">
      <a href="./dashboard.html" id="my-gifts-link" style="display:none;color:inherit;text-decoration:none;opacity:0.7;font-size:0.9rem;margin-right:20px">我的礼物</a>
      <button class="button--login" id="open-auth-modal">Log in / Sign up</button>
    </div>
  </header>
  <main>
    <section class="block block--intro">
      <figure class="media">
        <img class="media__image" src="../8.webp" alt="Image 8" />
        <figcaption class="media__caption">Personal Website Gift Made for Someone Special
为特别之人专属定制的网站礼物.</figcaption>
      </figure>
    </section>
    <section class="block block--main">
      <div class="block__wrapper">
        <div class="content">
          <h2 class="content__title">Custom Website Gift</h2>
          <p class="content__description">
            No more templates. Freeze unique memories in an interactive page built just for them.
          </p>
          <a class="content__button button--primary" href="./chat.html" onclick="localStorage.removeItem('chat_session_id')">Try for free</a>
        </div>
        <div class="gallery">
          <ul class="gallery__grid">
            <li class="gallery__item">
              <img class="gallery__image" src="../1.webp" alt="Image 1" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../2.webp" alt="Image 2" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../3.webp" alt="Image 3" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../4.webp" alt="Image 4" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../5.webp" alt="Image 5" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../6.webp" alt="Image 6" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../7.webp" alt="Image 7" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../8.webp" alt="Image 8" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../9.webp" alt="Image 9" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../10.webp" alt="Image 10" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../11.webp" alt="Image 11" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../12.webp" alt="Image 12" />
            </li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="modal-content">
      <button class="close-button" aria-label="Close">&times;</button>

      <!-- Step 1: email -->
      <div id="auth-step-email">
        <h2 id="auth-title">登录 / 注册</h2>
        <p style="font-size:0.9rem;opacity:0.6;margin:4px 0 16px">输入邮箱，发送验证码</p>
        <form id="auth-email-form">
          <input type="email" id="auth-email" placeholder="your@email.com" required autocomplete="email">
          <button type="submit">发送验证码</button>
          <p class="form-error"></p>
        </form>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)">
          <p style="font-size:0.85rem;opacity:0.5;margin:0 0 10px">已有密码？直接登录</p>
          <form id="auth-password-form">
            <input type="email" id="auth-pw-email" placeholder="邮箱" required autocomplete="email">
            <input type="password" id="auth-pw-password" placeholder="密码" required autocomplete="current-password">
            <button type="submit">密码登录</button>
            <p class="form-error"></p>
          </form>
        </div>
      </div>

      <!-- Step 2: link sent -->
      <div id="auth-step-code" style="display:none">
        <h2>检查邮件</h2>
        <p style="font-size:0.9rem;opacity:0.6;margin:4px 0 8px">登录链接已发送到</p>
        <p style="font-weight:600;margin:0 0 20px"><span id="auth-email-display"></span></p>
        <p style="font-size:0.85rem;opacity:0.5;line-height:1.6">点击邮件里的链接，会自动跳回这里完成登录。<br>没收到？检查一下垃圾邮件。</p>
        <button id="auth-back-btn" style="background:none;border:none;opacity:0.5;cursor:pointer;margin-top:20px;font-size:0.85rem;color:inherit">← 重新输入邮箱</button>
      </div>

      <!-- Step 3: optional set password -->
      <div id="auth-step-setpw" style="display:none">
        <h2>设置密码（可选）</h2>
        <p style="font-size:0.9rem;opacity:0.6;margin:4px 0 20px">下次可以直接用邮箱+密码登录，不用再等验证码</p>
        <form id="auth-setpw-form">
          <input type="password" id="auth-new-password" placeholder="设置密码（至少6位）" minlength="6" autocomplete="new-password">
          <button type="submit">保存密码</button>
          <p class="form-error"></p>
        </form>
        <button id="auth-skip-btn" style="background:none;border:none;opacity:0.5;cursor:pointer;margin-top:12px;font-size:0.85rem;color:inherit">跳过，以后再说</button>
      </div>
    </div>
  </div>

  <script type="module" src="./scripts/index.js"></script>
</body>

</html>
