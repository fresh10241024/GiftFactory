<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Gift</title>
    <link rel="stylesheet" href="./styles/base.css">
    <style>
        body { margin: 0; background: #0a0a0f; color: #fff; font-family: system-ui, sans-serif; }
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.6); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-text { font-size: 0.85rem; letter-spacing: 0.15em; opacity: 0.5; }
        #gift-frame { display: none; width: 100%; height: 100vh; border: none; }
        #error-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; text-align: center; padding: 20px; }
        #error-view p { opacity: 0.5; font-size: 0.9rem; }
        #retry-btn { margin-top: 8px; padding: 10px 28px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.85rem; letter-spacing: 0.1em; }
        #retry-btn:hover { background: rgba(255,255,255,0.18); }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="status-text">Generating your gift website...</div>
        <div id="progress-bar-wrap" style="width:260px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:4px">
            <div id="progress-bar" style="height:100%;width:0%;background:rgba(255,255,255,0.5);border-radius:2px;transition:width 1.2s ease"></div>
        </div>
        <div id="time-hint" style="font-size:0.72rem;opacity:0.3;margin-top:6px">AI is reading your story...</div>
    </div>
    <iframe id="gift-frame"></iframe>
    <div id="error-view">
        <h2>Encountered a problem generating</h2>
        <p id="error-msg"></p>
        <button id="retry-btn" onclick="startFlow()">Retry</button>
    </div>
    <script type="module">
        const BASE = '/api';
        const urlSession = new URLSearchParams(window.location.search).get('session');
        if (urlSession) localStorage.setItem('chat_session_id', urlSession);
        const sessionId = localStorage.getItem('chat_session_id');
        function authHeaders() {
            const t = localStorage.getItem('token');
            return t ? { Authorization: `Bearer ${t}` } : {};
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-view').style.display = 'flex';
            document.getElementById('error-msg').textContent = msg || 'Please return and try again';
        }

        function showGift(slug) {
            document.getElementById('loading').style.display = 'none';
            const frame = document.getElementById('gift-frame');
            frame.src = BASE + '/gifts/' + slug;
            frame.style.display = 'block';
        }

        const STAGES = [
            [5,  'AI is reading your story...'],
            [15, 'Designing the visual layout...'],
            [30, 'Writing scene by scene...'],
            [55, 'Polishing animations...'],
            [75, 'Adding the finishing touches...'],
            [90, 'Almost ready...'],
        ];
        function updateProgress(elapsed) {
            let pct = 5, label = STAGES[0][1];
            for (const [t, l] of STAGES) { if (elapsed >= t) { pct = Math.min(t / 90 * 92, 92); label = l; } }
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('time-hint').textContent = label;
        }

        async function poll(sid) {
            let errCount = 0, elapsed = 0;
            const timer = setInterval(() => {
                elapsed += 1;
                document.getElementById('status-text').textContent = `Generating · ${elapsed}s`;
                updateProgress(elapsed);
            }, 1000);
            for (let i = 0; i < 80; i++) {
                await new Promise(r => setTimeout(r, 3000));
                try {
                    const res = await fetch(BASE + '/sessions/' + sid + '/gift', { headers: authHeaders() });
                    if (!res.ok) { errCount++; if (errCount >= 3) { clearInterval(timer); showError('Server error ' + res.status); return; } continue; }
                    errCount = 0;
                    const data = await res.json();
                    if (data.status === 'done') { clearInterval(timer); document.getElementById('progress-bar').style.width='100%'; setTimeout(()=>showGift(data.slug), 400); return; }
                    if (data.status === 'error') { clearInterval(timer); showError(data.error); return; }
                } catch (e) { errCount++; if (errCount >= 3) { clearInterval(timer); showError('Network error, please try again'); return; } }
            }
            clearInterval(timer);
            showError('Generation timed out, please try again');
        }

        async function startFlow() {
            document.getElementById('error-view').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('status-text').textContent = 'Generating your gift website...';
            if (!sessionId) { showError('Session expired, please return and restart'); return; }
            try {
                const check = await fetch(BASE + '/sessions/' + sessionId + '/gift', { headers: authHeaders() });
                const data = await check.json();
                if (data.status === 'done') { showGift(data.slug); return; }
                if (data.status === 'generating') { poll(sessionId); return; }
            } catch (e) {}
            try {
                const res = await fetch(BASE + '/sessions/' + sessionId + '/generate', { method: 'POST', headers: authHeaders() });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                poll(sessionId);
            } catch (e) { showError('Failed to start generation: ' + e.message); }
        }

        window.startFlow = startFlow;
        startFlow();
    </script>
</body>
</html>
