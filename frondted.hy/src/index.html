<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Website Gift | Codrops</title>
  <meta name="description" content="No more templates. Freeze unique memories in an interactive page built just for them." />
  <meta name="author" content="Theo Plawinski" />
  <link rel="shortcut icon" href="https://tympanus.net/favicon/favicon.ico" />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/index.css" />
  <script>
    document.documentElement.className = 'js';
  </script>
</head>

<body class="loading">
  <header class="frame">
    <div class="frame__infos">
    </div>
    <div class="frame__auth-buttons">
      <button class="button--login">Log in</button>
      <button class="button--signup">Sign up</button>
    </div>
  </header>
  <main>
    <section class="block block--intro">
      <figure class="media">
        <img class="media__image" src="../8.webp" alt="Image 8" />
        <figcaption class="media__caption">Personal Website Gift Made for Someone Special
为特别之人专属定制的网站礼物.</figcaption>
      </figure>
    </section>
    <section class="block block--main">
      <div class="block__wrapper">
        <div class="content">
          <h2 class="content__title">Custom Website Gift</h2>
          <p class="content__description">
            No more templates. Freeze unique memories in an interactive page built just for them.
          </p>
          <a class="content__button button--primary" href="./chat.html">Try for free</a>
        </div>
        <div class="gallery">
          <ul class="gallery__grid">
            <li class="gallery__item">
              <img class="gallery__image" src="../1.webp" alt="Image 1" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../2.webp" alt="Image 2" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../3.webp" alt="Image 3" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../4.webp" alt="Image 4" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../5.webp" alt="Image 5" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../6.webp" alt="Image 6" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../7.webp" alt="Image 7" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../8.webp" alt="Image 8" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../9.webp" alt="Image 9" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../10.webp" alt="Image 10" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../11.webp" alt="Image 11" />
            </li>
            <li class="gallery__item">
              <img class="gallery__image" src="../12.webp" alt="Image 12" />
            </li>
          </ul>
        </div>
      </div>
    </section>
  </main>

  <!-- Login Modal -->
  <div id="login-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="login-title">
    <div class="modal-content">
      <h2 id="login-title">Log In</h2>
      <form>
        <label for="login-email">Email:</label>
        <input type="email" id="login-email" name="email" required>
        <label for="login-password">Password:</label>
        <input type="password" id="login-password" name="password" required>
        <button type="submit">Log In</button>
      </form>
      <p>Or log in with:</p>
      <div class="social-login">
        <button class="google-login">Google</button>
        <button class="github-login">GitHub</button>
      </div>
      <button class="close-button" aria-label="Close login form">&times;</button>
    </div>
  </div>

  <!-- Sign Up Modal -->
  <div id="signup-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="signup-title">
    <div class="modal-content">
      <h2 id="signup-title">Sign Up</h2>
      <form>
        <label for="signup-email">Email:</label>
        <input type="email" id="signup-email" name="email" required>
        <label for="signup-password">Password:</label>
        <input type="password" id="signup-password" name="password" required>
        <label for="signup-confirm-password">Confirm Password:</label>
        <input type="password" id="signup-confirm-password" name="confirm-password" required>
        <button type="submit">Sign Up</button>
      </form>
      <p>Or sign up with:</p>
      <div class="social-login">
        <button class="google-signup">Google</button>
        <button class="github-signup">GitHub</button>
      </div>
      <button class="close-button" aria-label="Close signup form">&times;</button>
    </div>
  </div>

  <script type="module" src="./scripts/index.js"></script>
</body>

</html>
